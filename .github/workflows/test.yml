name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bats-core
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run model resolution tests
        timeout-minutes: 1
        run: bats tests/test_model_resolution.bats

      - name: Run config operations tests
        timeout-minutes: 2
        run: bats tests/test_config_operations.bats

      - name: Run argument tests
        timeout-minutes: 2
        env:
          CI: true
        run: bats tests/test_arguments.bats
        timeout-minutes: 2
        run: |
          # Run only non-interactive tests
          bats tests/test_arguments.bats --filter "!interactive"

      - name: Test script execution
        timeout-minutes: 1
        run: |
          chmod +x switch-model.sh
          ./switch-model.sh --help
